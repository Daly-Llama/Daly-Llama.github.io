<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title: shows "Page Name | Your Name" in the browser tab -->
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- ============================================================
       FONTS — loaded via CSS, zero JavaScript required.
       To swap fonts: replace the Google Fonts URL below, then
       update --font-heading and --font-body in style.css.
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- All visual styling lives in this one file -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

  <!-- ============================================================
       NAVIGATION BAR
       To add a new page: copy one <li> block, update the
       href to match your new filename (without .md), and
       update the link text.
       ============================================================ -->
  <nav class="site-nav">
    <div class="nav-inner">

      <a href="{{ '/' | relative_url }}" class="nav-brand">{{ site.title }}</a>

      <ul class="nav-links">
        <li>
          <a href="{{ '/' | relative_url }}"
             {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>Home</a>
        </li>
        <li>
          <a href="{{ '/about' | relative_url }}"
             {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
        </li>
        <li>
          <a href="{{ '/projects' | relative_url }}"
             {% if page.url contains 'projects' %}class="active"{% endif %}>Projects</a>
        </li>
        <li>
          <a href="{{ '/writing' | relative_url }}"
         {% if page.url contains 'writing' %}class="active"{% endif %}>Writing</a>
        </li>
        <li>
          <a href="{{ '/contact' | relative_url }}"
             {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a>
        </li>
        <!--
          ADD A NEW PAGE:
          1. Create yourpage.md in the project root (copy any .md file)
          2. Paste a new <li> here:
             <li>
               <a href="{{ '/yourpage' | relative_url }}"
                  {% if page.url contains 'yourpage' %}class="active"{% endif %}>Your Page</a>
             </li>
        -->
      </ul>

    </div>
  </nav>

  <!-- ============================================================
       MAIN CONTENT
       Jekyll automatically inserts each page's Markdown here.
       You do not need to edit this section.
       ============================================================ -->
  <main class="site-main">
    {{ content }}
  </main>

  <!-- ============================================================
       FOOTER  —  Edit name, tagline, and links below.
       Contact info is pulled from _config.yml automatically.
       ============================================================ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-name">{{ site.title }}</p>
      <p class="footer-tagline">{{ site.tagline }}</p>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="mailto:{{ site.email }}">Email</a>
        <a href="{{ site.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="{{ site.github }}"   target="_blank" rel="noopener">GitHub</a>
      </nav>
      <p class="footer-copy">&copy; 2025 {{ site.title }}. Built with GitHub Pages.</p>
    </div>
  </footer>

</body>
</html>
